<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Phoenix AI Ultra Terminal</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0b0f19;
color:white;
}

/* NAVBAR */

nav{
background:#111827;
padding:15px;
text-align:center;
font-size:22px;
color:#00ffcc;
font-weight:bold;
}

/* DASHBOARD */

.dashboard{
display:flex;
flex-wrap:wrap;
gap:20px;
padding:20px;
}

.box{
background:#111827;
padding:20px;
border-radius:10px;
border:1px solid #00ffcc;
width:200px;
text-align:center;
}

/* CHART */

.chart-box{
margin:20px;
background:#111827;
padding:20px;
border-radius:10px;
border:1px solid #00ffcc;
}

/* SIGNAL */

.signal{
font-size:20px;
color:#00ffcc;
}

/* CALCULATOR */

.calc{
padding:20px;
}

input{
padding:10px;
margin:5px;
}

button{
padding:10px;
background:#00ffcc;
border:none;
cursor:pointer;
}

</style>
</head>

<body>

<nav>
🔥 Phoenix AI Ultra Trading Terminal
</nav>

<!-- MARKET DASHBOARD -->

<div class="dashboard">

<div class="box">
<h3>NIFTY</h3>
<p>Live via TradingView</p>
</div>

<div class="box">
<h3>BANKNIFTY</h3>
<p>Live via TradingView</p>
</div>

<div class="box">
<h3>INDIA VIX</h3>
<p>Volatility Monitor</p>
</div>

</div>

<!-- SYMBOL SELECT -->

<div style="padding:20px">

<select onchange="changeSymbol(this.value)">

<option value="NSE:NIFTY1!">NIFTY</option>
<option value="NSE:BANKNIFTY1!">BANKNIFTY</option>
<option value="NSE:FINNIFTY1!">FINNIFTY</option>

</select>

</div>

<!-- CHART -->

<div class="chart-box">

<div id="tradingview_chart"></div>

</div>

<!-- AI SIGNAL -->

<div class="chart-box">

<h3>AI Trade Signal</h3>

<p id="signal" class="signal">Analyzing Market...</p>

</div>

<!-- OPTION CALCULATOR -->

<div class="chart-box calc">

<h3>Option Profit Calculator</h3>

<input id="buy" placeholder="Buy Price">
<input id="sell" placeholder="Sell Price">
<input id="lot" placeholder="Lot Size">

<button onclick="profit()">Calculate</button>

<p id="result"></p>

</div>

<script src="https://s3.tradingview.com/tv.js"></script>

<script>

/* LOAD CHART */

function loadChart(symbol){

new TradingView.widget({

width:"100%",
height:500,
symbol:symbol,
interval:"5",
timezone:"Asia/Kolkata",
theme:"dark",
style:"1",
container_id:"tradingview_chart"

});

}

loadChart("NSE:NIFTY1!");

/* SYMBOL SWITCH */

function changeSymbol(symbol){

document.getElementById("tradingview_chart").innerHTML="";

loadChart(symbol);

}

/* OPTION PROFIT */

function profit(){

let buy=document.getElementById("buy").value;

let sell=document.getElementById("sell").value;

let lot=document.getElementById("lot").value;

let result=(sell-buy)*lot;

document.getElementById("result").innerHTML="Profit ₹"+result;

}

/* AI SIGNAL */

function aiSignal(){

let r=Math.random();

if(r>0.65){

return "📈 BUY CALL";

}

if(r<0.35){

return "📉 BUY PUT";

}

return "⚠️ SIDEWAYS MARKET";

}

setInterval(()=>{

document.getElementById("signal").innerHTML=aiSignal();

},6000);

</script>

</body>
</html>
