<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phoenix AI Terminal</title>

<script src="https://s3.tradingview.com/tv.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#0b0f19;
color:white;
display:flex;
height:100vh;
}

/* LEFT SIDEBAR */

.sidebar{
width:200px;
background:#111827;
padding:10px;
}

.sidebar button{
width:100%;
padding:10px;
margin:5px 0;
background:#00ffcc;
border:none;
cursor:pointer;
}

/* MAIN AREA */

.main{
flex:1;
display:flex;
flex-direction:column;
}

.topbar{
background:#111827;
padding:10px;
text-align:center;
color:#00ffcc;
font-size:20px;
}

/* PANELS */

.panel{
flex:1;
display:none;
padding:20px;
}

.active{
display:block;
}

/* CHART */

#chart{
height:500px;
}

/* CALCULATOR */

input{
padding:10px;
margin:5px;
}

/* ADMIN */

.userbox{
background:#111827;
padding:10px;
margin:5px 0;
}

</style>
</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

<button onclick="showPanel('watchlist')">Watchlist</button>

<button onclick="showPanel('chartPanel')">Chart</button>

<button onclick="showPanel('calc')">Calculator</button>

<button onclick="showPanel('menu')">Menu</button>

</div>

<!-- MAIN -->

<div class="main">

<div class="topbar">
🔥 Phoenix AI Trading Terminal
</div>

<!-- WATCHLIST -->

<div id="watchlist" class="panel active">

<h3>Watchlist</h3>

<ul>
<li onclick="loadChart('NSE:NIFTY1!')">NIFTY</li>
<li onclick="loadChart('NSE:BANKNIFTY1!')">BANKNIFTY</li>
<li onclick="loadChart('NSE:FINNIFTY1!')">FINNIFTY</li>
<li onclick="loadChart('BSE:SENSEX')">SENSEX</li>
</ul>

</div>

<!-- CHART -->

<div id="chartPanel" class="panel">

<div id="chart"></div>

</div>

<!-- CALCULATOR -->

<div id="calc" class="panel">

<h3>Option Calculator</h3>

<input id="buy" placeholder="Buy Price">
<input id="sell" placeholder="Sell Price">
<input id="lot" placeholder="Lot Size">

<button onclick="profit()">Calculate</button>

<p id="result"></p>

</div>

<!-- MENU -->

<div id="menu" class="panel">

<h3>Menu</h3>

<button onclick="profile()">Profile</button>

<button onclick="language()">Language</button>

<button onclick="admin()">Admin Dashboard</button>

</div>

<!-- ADMIN DASHBOARD -->

<div id="adminPanel" class="panel">

<h3>Admin Dashboard</h3>

<p>Total Users: <span id="userCount">3</span></p>

<div class="userbox">aman@gmail.com</div>
<div class="userbox">trader@gmail.com</div>
<div class="userbox">admin@gmail.com</div>

</div>

</div>

<script>

/* PANEL SWITCH */

function showPanel(id){

let panels=document.querySelectorAll(".panel");

panels.forEach(p=>p.classList.remove("active"));

document.getElementById(id).classList.add("active");

}

/* LOAD CHART */

function loadChart(symbol){

showPanel("chartPanel");

document.getElementById("chart").innerHTML="";

new TradingView.widget({

symbol:symbol,
interval:"5",
container_id:"chart",
width:"100%",
height:500,
theme:"dark"

});

}

/* CALCULATOR */

function profit(){

let buy=document.getElementById("buy").value;

let sell=document.getElementById("sell").value;

let lot=document.getElementById("lot").value;

let result=(sell-buy)*lot;

document.getElementById("result").innerHTML="Profit ₹ "+result;

}

/* MENU */

function profile(){

alert("Profile editing feature coming soon");

}

function language(){

alert("Language option coming soon");

}

function admin(){

showPanel("adminPanel");

}

</script>

</body>
</html>
