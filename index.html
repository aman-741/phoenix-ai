<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Phoenix AI Pro</title>

<script src="https://s3.tradingview.com/tv.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#0b0f19;
color:white;
display:flex;
height:100vh;
}

/* LEFT WATCHLIST */

.watchlist{
width:200px;
background:#111827;
padding:10px;
overflow:auto;
}

.watchlist h3{
color:#00ffcc;
}

.watchlist li{
cursor:pointer;
margin:10px 0;
}

/* CENTER */

.center{
flex:1;
display:flex;
flex-direction:column;
}

/* TOP BAR */

.topbar{
background:#111827;
padding:10px;
text-align:center;
color:#00ffcc;
font-size:20px;
}

/* CHART */

#chart{
flex:1;
}

/* BOTTOM PANEL */

.bottom{
background:#111827;
padding:10px;
display:flex;
gap:20px;
}

/* CALCULATOR */

.calc input{
padding:8px;
margin:5px;
}

button{
padding:8px;
background:#00ffcc;
border:none;
cursor:pointer;
}

/* RIGHT MENU */

.menu{
width:200px;
background:#111827;
padding:10px;
}

.menu button{
width:100%;
margin:5px 0;
}

.panel{
display:none;
}

.active{
display:block;
}

</style>

</head>

<body>

<!-- WATCHLIST -->

<div class="watchlist">

<h3>Watchlist</h3>

<ul>

<li onclick="loadChart('NSE:NIFTY1!')">NIFTY</li>
<li onclick="loadChart('NSE:BANKNIFTY1!')">BANKNIFTY</li>
<li onclick="loadChart('NSE:FINNIFTY1!')">FINNIFTY</li>
<li onclick="loadChart('BSE:SENSEX')">SENSEX</li>

</ul>

</div>

<!-- CENTER AREA -->

<div class="center">

<div class="topbar">

🔥 Phoenix AI Trading Terminal

</div>

<div id="chart"></div>

<div class="bottom">

<div class="calc">

<h3>Option Calculator</h3>

<input id="buy" placeholder="Buy">

<input id="sell" placeholder="Sell">

<input id="lot" placeholder="Lot Size">

<button onclick="profit()">Calculate</button>

<p id="result"></p>

</div>

</div>

</div>

<!-- MENU -->

<div class="menu">

<h3>Menu</h3>

<button onclick="showPanel('profile')">Profile</button>

<button onclick="showPanel('language')">Language</button>

<button onclick="showPanel('admin')">Admin</button>

</div>

<!-- PROFILE PANEL -->

<div id="profile" class="panel">

<h3>Edit Profile</h3>

<input placeholder="Name">

<input placeholder="Email">

<button>Save</button>

</div>

<!-- LANGUAGE PANEL -->

<div id="language" class="panel">

<h3>Language</h3>

<button>English</button>

<button>Hindi</button>

</div>

<!-- ADMIN PANEL -->

<div id="admin" class="panel">

<h3>Admin Dashboard</h3>

<p>Total Users: <span id="users">3</span></p>

<ul>

<li>aman@gmail.com</li>
<li>trader@gmail.com</li>
<li>member@gmail.com</li>

</ul>

</div>

<script>

/* CHART */

function loadChart(symbol){

document.getElementById("chart").innerHTML="";

new TradingView.widget({

symbol:symbol,
interval:"5",
container_id:"chart",
width:"100%",
height:"100%",
theme:"dark"

});

}

/* DEFAULT CHART */

loadChart("NSE:NIFTY1!");

/* CALCULATOR */

function profit(){

let buy=document.getElementById("buy").value;

let sell=document.getElementById("sell").value;

let lot=document.getElementById("lot").value;

let result=(sell-buy)*lot;

document.getElementById("result").innerHTML="Profit ₹ "+result;

}

/* MENU PANELS */

function showPanel(id){

let panels=document.querySelectorAll(".panel");

panels.forEach(p=>p.classList.remove("active"));

document.getElementById(id).classList.add("active");

}

</script>

</body>

</html>
